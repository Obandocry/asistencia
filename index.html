<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - Misión Paz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <style>
        :root { --primary: #185FA5; --gold: #D4AF37; --bg: #f4f7f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; }
        .app { max-width: 500px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border-bottom: 4px solid var(--primary); }
        .logo-img { width: 50px; height: 50px; object-fit: contain; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn { padding: 15px; border-radius: 10px; border: none; cursor: pointer; width: 100%; font-weight: 700; font-size: 14px; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .video-container { background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 10px; aspect-ratio: 4/3; }
        .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <img src="https://misionpaz.org/wp-content/uploads/2024/07/cropped-logos157x157-3.png" class="logo-img">
        <div><h1 style="font-size:1.1rem; color:var(--primary)">MISIÓN PAZ</h1><p style="font-size:9px; color:gray;">SISTEMA DE ASISTENCIA CLOUD</p></div>
    </header>

    <div id="loginScreen" class="card">
        <select id="loginUser" class="btn" style="background:#f8fafc; border:1px solid #ddd;">
            <option value="">¿Quién eres?</option>
            <option value="admin">Liderazgo (Admin)</option>
            <option value="colaborador">Colaborador / Voluntario</option>
        </select>
        <button class="btn btn-primary" onclick="login()">INGRESAR AL SISTEMA</button>
    </div>

    <div id="adminScreen" style="display:none;" class="card">
        <h3 style="margin-bottom:10px; color:var(--primary);">Registros en la Nube</h3>
        <div id="adminLogs">Cargando datos...</div>
        <button class="btn" onclick="location.reload()" style="background:#eee;">Cerrar Sesión</button>
    </div>

    <div id="workerScreen" style="display:none;" class="card">
        <div class="video-container">
            <video id="videoEl" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <canvas id="canvasEl" style="display:none;"></canvas>
            <img id="photoPreview" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
        <button id="btnPhoto" class="btn" style="background:#64748b; color:white;" onclick="takePhoto()">TOMAR FOTO DE CONTROL</button>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn" style="background:#0F6E56; color:white;" onclick="report('Entrada')">LLEGADA</button>
            <button class="btn" style="background:#993C1D; color:white;" onclick="report('Salida')">SALIDA</button>
        </div>
        <p id="statusMsg" style="text-align:center; margin-top:10px; font-size:12px; color:var(--primary); font-weight:bold;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIGURACIÓN DE TU PROYECTO
    const firebaseConfig = {
        apiKey: "AIzaSyADQMa7pf-0-FojRTFKeKI_5J-IrlsZZpo",
        authDomain: "asistencia-misionpaz.firebaseapp.com",
        projectId: "asistencia-misionpaz",
        storageBucket: "asistencia-misionpaz.firebasestorage.app",
        messagingSenderId: "335946160039",
        appId: "1:335946160039:web:2a146c234f753819c64882"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.login = () => {
        const user = document.getElementById('loginUser').value;
        if(!user) return alert("Selecciona un usuario");
        document.getElementById('loginScreen').style.display = 'none';
        if(user === 'admin') {
            document.getElementById('adminScreen').style.display = 'block';
            listenLogs();
        } else {
            document.getElementById('workerScreen').style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('videoEl').srcObject = s);
        }
    };

    window.takePhoto = () => {
        const v = document.getElementById('videoEl');
        const c = document.getElementById('canvasEl');
        c.width = 320; c.height = 240; // Tamaño pequeño para ahorrar espacio gratis
        c.getContext('2d').drawImage(v, 0, 0, 320, 240);
        window.lastPhoto = c.toDataURL('image/jpeg', 0.5); // Comprimida
        document.getElementById('photoPreview').src = window.lastPhoto;
        document.getElementById('photoPreview').style.display = 'block';
        v.style.display = 'none';
        document.getElementById('btnPhoto').innerText = "CAMBIAR FOTO";
    };

    window.report = async (tipo) => {
        if(!window.lastPhoto) return alert("Primero tómate la foto");
        document.getElementById('statusMsg').innerText = "Guardando en la nube...";
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                await addDoc(collection(db, "asistencias"), {
                    usuario: document.getElementById('loginUser').value,
                    tipo: tipo,
                    fecha: new Date().toISOString(),
                    foto: window.lastPhoto,
                    gps: `${pos.coords.latitude},${pos.coords.longitude}`
                });
                alert("¡Registro exitoso en la nube! Bendiciones.");
                location.reload();
            } catch (e) { alert("Error: Revisa que Firestore esté en 'Modo Prueba'"); }
        }, () => alert("Activa el GPS para marcar asistencia"));
    };

    function listenLogs() {
        const q = query(collection(db, "asistencias"), orderBy("fecha", "desc"));
        onSnapshot(q, (snap) => {
            const cont = document.getElementById('adminLogs');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="log-item">
                        <img src="${d.foto}" class="avatar">
                        <div style="flex:1; margin-left:10px;">
                            <b>${d.usuario}</b><br><small>${d.tipo} - ${new Date(d.fecha).toLocaleTimeString()}</small>
                        </div>
                        <a href="https://www.google.com/maps?q=${d.gps}" target="_blank" style="color:var(--primary); font-size:10px; font-weight:bold;">MAPA</a>
                    </div>`;
            });
        });
    }
</script>
</body>
</html>
