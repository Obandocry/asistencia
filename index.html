<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Paz - Sistema Nómina v8</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #185FA5; --secondary: #0F4C81; --accent: #D4AF37; --bg: #f0f4f8; --white: #ffffff; --danger: #c53030; --success: #2f855a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; }
        .card { background: var(--white); margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
        .form-select, .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; color: white; }
        .stat-item { background: rgba(255,255,255,0.15); padding: 10px; border-radius: 10px; text-align: center; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="app-container">
    <header style="background:white; padding:20px; text-align:center; border-radius:0 0 20px 20px;">
        <img src="https://misionpaz.org/wp-content/uploads/2024/07/cropped-logos157x157-3.png" style="width:50px;">
        <h2 style="color:var(--primary); font-size:1.1rem;">GESTIÓN DE TIEMPOS MP</h2>
    </header>

    <div id="screenLogin" class="card">
        <select id="selArea" class="form-select" onchange="filtrarUsuarios()"><option value="">Seleccione Área</option></select>
        <select id="selUser" class="form-select"><option value="">Nombre</option></select>
        <input type="password" id="inputPass" class="form-input" placeholder="Contraseña">
        <button class="btn-main" onclick="intentarEntrar()">INGRESAR</button>
    </div>

    <div id="screenCapture" style="display:none;" class="card">
        <video id="webcam" autoplay playsinline style="width:100%; border-radius:15px;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="btn-main" onclick="doPhoto()" style="margin:10px 0;">CAPTURAR</button>
        <div id="seccionJustifica" style="display:none;"><textarea id="txtNota" class="form-input" placeholder="Justificación"></textarea></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn-main" style="background:var(--success);" onclick="saveRecord('Entrada')">ENTRADA</button>
            <button class="btn-main" style="background:var(--danger);" onclick="saveRecord('Salida')">SALIDA</button>
        </div>
    </div>

    <div id="screenAdmin" style="display:none;">
        <div style="background:var(--secondary); padding:20px; margin:15px; border-radius:20px; color:white;">
            <input type="date" id="filterDate" class="form-input" onchange="aplicarFiltro()">
            <div class="stat-grid">
                <div class="stat-item"><b id="sumHoras">0</b><br>HRS TOTAL</div>
                <div class="stat-item"><b id="sumNocturnas">0</b><br>NOCTURNAS</div>
                <div class="stat-item"><b id="sumFestivas">0</b><br>FESTIVAS</div>
            </div>
        </div>
        <div class="card">
            <button class="btn-main" onclick="exportarExcelTodo()">DESCARGAR REPORTE NÓMINA</button>
        </div>
        <div id="logsContainer"></div>
    </div>
</div>

<script type="module">
    // --- LISTA DE FESTIVOS COLOMBIA 2026 ---
    const FESTIVOS_2026 = [
        "2026-01-01", "2026-01-05", "2026-03-23", "2026-04-02", "2026-04-03",
        "2026-05-01", "2026-05-18", "2026-06-08", "2026-06-15", "2026-06-29",
        "2026-07-20", "2026-08-07", "2026-08-17", "2026-10-12", "2026-11-02",
        "2026-11-16", "2026-12-08", "2026-12-25"
    ];

    function esFestivoODomingo(fechaStr) {
        const d = new Date(fechaStr + "T00:00:00");
        const esDomingo = d.getDay() === 0;
        const esFestivo = FESTIVOS_2026.includes(fechaStr);
        return esDomingo || esFestivo;
    }

    // Lógica para calcular tramos de horas (Simplificada para Analista de Soporte)
    function analizarTurno(entrada, salida) {
        const hIn = new Date(entrada);
        const hOut = new Date(salida);
        const totalMs = hOut - hIn;
        const totalHrs = Math.max(0, totalMs / (1000 * 60 * 60));

        let nocturnas = 0;
        // Si la salida es después de las 21:00 o entrada antes de las 06:00
        if (hOut.getHours() >= 21 || hIn.getHours() < 6) {
            // Cálculo aproximado para reporte inicial
            nocturnas = totalHrs * 0.3; 
        }

        const fechaCorta = entrada.split('T')[0];
        const festiva = esFestivoODomingo(fechaCorta);

        return { 
            total: totalHrs.toFixed(2), 
            nocturnas: nocturnas.toFixed(2), 
            festiva: festiva ? totalHrs.toFixed(2) : 0 
        };
    }

    // --- EL RESTO DE LA LÓGICA DE FIREBASE Y CAPTURA SE MANTIENE ---
    // (Incluye la franja dorada en doPhoto y el guardado de GPS)
    
    window.exportarExcelTodo = () => {
        // Agrupamos por usuario para sumar sus horas del mes
        const dataParaExcel = logsGlobales.map(l => {
            const analisis = l.tipo === 'Salida' ? {total:0, nocturnas:0, festiva:0} : {total:0, nocturnas:0, festiva:0}; 
            // Nota: Para un reporte real, el sistema busca la pareja Entrada-Salida
            return {
                Usuario: l.usuario,
                Fecha: l.fechaCorta,
                Tipo: l.tipo,
                Hora: new Date(l.fecha).toLocaleTimeString(),
                Es_Festivo: esFestivoODomingo(l.fechaCorta) ? "SÍ" : "NO",
                Nota: l.nota
            };
        });

        const ws = XLSX.utils.json_to_sheet(dataParaExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Nomina_MisionPaz");
        XLSX.writeFile(wb, "Reporte_Asistencia_2026.xlsx");
    };

    // Reutiliza las funciones de v7: filtrarUsuarios, intentarEntrar, doPhoto, saveRecord
</script>
</body>
</html>
